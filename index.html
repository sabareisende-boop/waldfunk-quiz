<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waldfunk Eichhörnchen-Rätsel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#fdf6e3]">
    <div id="root"></div>

    <script type="text/babel">
        // Da wir jetzt Babel nutzen, können wir wieder den schönen JSX-Code verwenden!
        // Ich habe den Code aus deinem WaldfunkQuiz.jsx hier direkt hineinkopiert.
        
        const { useState } = React;

        // Icons als einfache SVGs
        const TreePine = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m17 14 3 3.3a1 1 0 0 1-.7 1.7H4.7a1 1 0 0 1-.7-1.7L7 14h-.3a1 1 0 0 1-.7-1.7L9 9h-.2A1 1 0 0 1 8 7.3L12 3l4 4.3a1 1 0 0 1-.8 1.7H15l3 3.3a1 1 0 0 1-.8 1.7H17Z"/><path d="M12 19v3"/></svg>;
        const Mic = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>;
        const Award = () => <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>;
        const ChevronRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;
        const RotateCcw = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
        const Info = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;

        const quizData = [
            { question: "Wofür nutzen wir Eichhörnchen unseren Schwanz am liebsten?", options: ["Steuern und Wärmen", "Verscheuchen", "Nüsse verstecken", "Regenschirm"], answerIndex: 0, frankSays: "Korrekt! Er hilft mir beim Springen." },
            { question: "Wie finden wir unsere Vorräte wieder?", options: ["Markierungen", "Geruchssinn & Gedächtnis", "Graben", "Schatzkarte"], answerIndex: 1, frankSays: "Genau! Meine Nase führt mich sicher." },
            { question: "Halten wir einen tiefen Winterschlaf?", options: ["Ja", "Nein, Winterruhe", "Süden", "Nachtaktiv"], answerIndex: 1, frankSays: "Richtig, wir wachen öfter auf." },
            { question: "Wie heißt unser Nest?", options: ["Horst", "Höhle", "Kobel", "Wipfelburg"], answerIndex: 2, frankSays: "Exakt! Ein gemütlicher Kobel." },
            { question: "Welche Farbe hat das Fell meist?", options: ["Grau", "Rot/Braun mit weißem Bauch", "Schwarz", "Braun gepunktet"], answerIndex: 1, frankSays: "Richtig, ein edles Fell!" }
        ];

        function WaldfunkQuiz() {
            const [hasStarted, setHasStarted] = useState(false);
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [score, setScore] = useState(0);
            const [showResults, setShowResults] = useState(false);
            const [selectedAnswer, setSelectedAnswer] = useState(null);

            if (!hasStarted) return (
                <div className="min-h-screen flex items-center justify-center p-4"><div className="max-w-xl bg-white p-10 rounded-3xl shadow-xl text-center">
                    <h1 className="text-3xl font-bold text-amber-900 mb-6">Der Waldfunk</h1>
                    <button onClick={() => setHasStarted(true)} className="bg-amber-800 text-white px-8 py-3 rounded-full hover:bg-amber-900">Starten</button>
                </div></div>
            );

            if (showResults) return (
                <div className="min-h-screen flex items-center justify-center p-4"><div className="max-w-xl bg-white p-10 rounded-3xl shadow-xl text-center">
                    <Award /> <h2 className="text-3xl font-bold mb-4">{score} von {quizData.length} Punkten!</h2>
                    <button onClick={() => window.location.reload()} className="bg-amber-100 px-6 py-2 rounded-full mt-4 flex items-center"><RotateCcw /> Neu starten</button>
                </div></div>
            );

            const q = quizData[currentQuestion];
            return (
                <div className="min-h-screen flex items-center justify-center p-4"><div className="max-w-2xl w-full bg-white p-8 rounded-3xl shadow-xl">
                    <h2 className="text-2xl font-bold mb-6">{q.question}</h2>
                    <div className="space-y-3">{q.options.map((opt, i) => (
                        <button key={i} onClick={() => { if(selectedAnswer === null) { setSelectedAnswer(i); if(i === q.answerIndex) setScore(s => s + 1); }}} className={`w-full p-4 rounded-xl border-2 ${selectedAnswer === null ? 'bg-gray-50' : i === q.answerIndex ? 'bg-green-100' : selectedAnswer === i ? 'bg-red-100' : 'opacity-50'}`}>{opt}</button>
                    ))}</div>
                    {selectedAnswer !== null && <button onClick={() => { if(currentQuestion + 1 < quizData.length) { setCurrentQuestion(c => c + 1); setSelectedAnswer(null); } else { setShowResults(true); } }} className="mt-6 w-full bg-amber-800 text-white py-3 rounded-xl">Weiter</button>}
                </div></div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<WaldfunkQuiz />);
    </script>
</body>
</html>
