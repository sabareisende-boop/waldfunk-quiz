!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waldfunk Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Wir laden React direkt und hoffen, dass die CSP hier weniger streng ist -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body class="bg-[#fdf6e3]">
    <div id="root"></div>

    <script>
        // Da wir Babel hier weglassen, schreiben wir reines React.createElement
        const e = React.createElement;
        
        function App() {
            return e('div', { className: 'min-h-screen flex flex-col items-center justify-center p-8' },
                e('h1', { className: 'text-4xl font-bold text-amber-900 mb-4' }, 'Willkommen beim Waldfunk!'),
                e('p', { className: 'text-lg text-amber-800' }, 'Das Quiz wurde erfolgreich geladen.')
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
</body>
</html>
