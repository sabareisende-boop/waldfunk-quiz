<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waldfunk Eichhörnchen-Rätsel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#fdf6e3]">
    <div id="root" class="min-h-screen flex items-center justify-center p-4">
        <div id="app" class="max-w-2xl w-full bg-white p-8 rounded-3xl shadow-xl text-center border-4 border-amber-100">
            <h1 class="text-3xl font-bold text-amber-900 mb-6 font-serif">Der Waldfunk</h1>
            <p id="message" class="text-lg text-amber-800 mb-8 italic">Frank von Wald hier – bereit für eine kleine Wissensreise durch unsere Wälder?</p>
            <button id="startBtn" class="bg-amber-800 text-white px-8 py-3 rounded-full hover:bg-amber-900 transition-all transform hover:scale-105 shadow-md">Rätsel starten</button>
        </div>
    </div>

    <script>
        const app = document.getElementById('app');

        const quizData = [
            { q: "Wofür nutzen wir Eichhörnchen unseren buschigen Schwanz am liebsten?", a: ["Steuern & Wärmen", "Verscheuchen", "Nüsse", "Regenschirm"], correct: 0, story: "Exzellent! Er ist mein liebstes Kleidungsstück und hilft mir beim Springen." },
            { q: "Wie finden wir unsere Vorräte wieder?", a: ["Markierung", "Geruch & Gedächtnis", "Graben", "Schatzkarte"], correct: 1, story: "Exakt! Meine Nase führt mich sicher zu jedem noch so tief vergrabenen Zapfen." },
            { q: "Wie heißt unser Nest in den Baumkronen?", a: ["Horst", "Höhle", "Kobel", "Wipfelburg"], correct: 2, story: "Richtig! Ein wohliges Heim, ausgepolstert mit weichem Moos." }
        ];

        let currentQ = 0;
        let score = 0;

        function showQuestion() {
            const data = quizData[currentQ];
            app.innerHTML = `
                <h2 class="text-2xl font-bold mb-6 text-amber-900 font-serif">${data.q}</h2>
                <div class="space-y-3">
                    ${data.a.map((opt, i) => `
                        <button onclick="checkAnswer(${i})" class="w-full p-4 rounded-xl border-2 border-amber-200 hover:bg-amber-50 hover:border-amber-400 transition-all text-left">
                            ${String.fromCharCode(65 + i)}) ${opt}
                        </button>
                    `).join('')}
                </div>
            `;
        }

        window.checkAnswer = (idx) => {
            const isCorrect = idx === quizData[currentQ].correct;
            if (isCorrect) score++;
            
            app.innerHTML = `
                <h2 class="text-2xl font-bold mb-6 ${isCorrect ? 'text-green-800' : 'text-red-800'}">
                    ${isCorrect ? 'Wahrhaftig!' : 'Ein kleiner Irrtum!'}
                </h2>
                <p class="mb-6 italic text-amber-900 font-serif text-lg">${quizData[currentQ].story}</p>
                <button onclick="next()" class="bg-amber-800 text-white px-8 py-3 rounded-full hover:bg-amber-900 transition-all w-full">Weiter</button>
            `;
        };

        window.next = () => {
            currentQ++;
            if (currentQ < quizData.length) {
                showQuestion();
            } else {
                app.innerHTML = `
                    <h2 class="text-3xl font-bold text-amber-900 mb-4 font-serif">Geschafft!</h2>
                    <p class="text-xl mb-6">Du hast ${score} von ${quizData.length} Punkten gesammelt.</p>
                    <button onclick="location.reload()" class="bg-amber-100 text-amber-900 px-8 py-3 rounded-full hover:bg-amber-200 transition-all">Erneut versuchen</button>
                `;
            }
        };

        document.getElementById('startBtn').onclick = showQuestion;
    </script>
</body>
</html>
