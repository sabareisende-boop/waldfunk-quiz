<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waldfunk Rätsel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Wir versuchen es ohne externe React-Quellen, indem wir die Logik vereinfachen -->
</head>
<body class="bg-[#fdf6e3]">
    <div id="root" class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-xl bg-white p-10 rounded-3xl shadow-xl text-center">
            <h1 id="status" class="text-2xl font-bold text-amber-900">Das Rätsel bereitet sich vor...</h1>
        </div>
    </div>

    <script>
        // Ein einfaches, direktes Script, das ohne externe React-Abhängigkeit auskommt
        // um zu sehen, ob das Problem am Laden der Bibliotheken liegt.
        window.onload = function() {
            const status = document.getElementById('status');
            status.innerText = "Der Waldfunk ist bereit! Das Rätsel lädt nun direkt.";
            
            // Wenn dies erscheint, können wir das Spiel hier in purem JavaScript einbetten.
            // Lass uns wissen, ob du diesen Text siehst!
        };
    </script>
</body>
</html>
